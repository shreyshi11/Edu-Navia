services:
  - type: web
    name: edu-navia-unified-app
    env: python
    buildCommand: "npm install && npm run build && pip install -r backend/requirements.txt"
    startCommand: "gunicorn -w 4 -k uvicorn.workers.UvicornWorker --chdir backend main:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
