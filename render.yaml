services:
  - type: web
    name: edu-navia-unified-app
    env: python
    buildCommand: "npm install && npm run build && pip install -r backend/requirements.txt"
    startCommand: "gunicorn -w 1 -k uvicorn.workers.UvicornWorker --chdir backend main:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
