  <style>
  /* Base Layout Setup for Sticky Footer */
html, body {
  height: 100%;
  margin: 0;
  padding: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f1f5f9;
  display: flex;
  flex-direction: column;
}

/* Main Content Area */


/* Heading */
h1 {
  text-align: center;
  color: #0f766e;
  margin-bottom: 2rem;
}

/* Filters Section */
.filters {
  display: flex;
  gap: 1rem;
  margin-bottom: 2rem;
  flex-wrap: wrap;
  justify-content: center;
}

select, button {
  padding: 10px 15px;
  border-radius: 10px;
  border: none;
  font-size: 1rem;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

button {
  background: #0d9488;
  color: white;
  cursor: pointer;
}


.card {
  background: linear-gradient(135deg, #a7f3d0, #fef9c3);
  padding: 1.5rem;
  border-radius: 20px;
  width: 280px;
  text-align: center;
  box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
  transition: transform 0.3s, box-shadow 0.3s;
}

.card:hover {
  transform: translateY(-8px);
  box-shadow: 0 16px 35px rgba(0, 0, 0, 0.2);
}

.card h3 {
  margin-top: 0;
  color: #065f46;
}

.card p {
  margin: 0.5rem 0;
  color: #374151;
}

/* Modal for No Results */
.modal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background-color: rgba(0,0,0,0.6);
  align-items: center;
  justify-content: center;
  z-index: 1000;
}

.modal-content {
  background: white;
  padding: 2rem;
  border-radius: 16px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  max-width: 400px;
  animation: fadeIn 0.3s ease-in-out;
}

.modal-content h2 {
  color: #ef4444;
}

.modal-content button {
  margin-top: 1rem;
  background: #0d9488;
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 8px;
  cursor: pointer;
}

@keyframes fadeIn {
  from { transform: scale(0.95); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

/* Responsive */
@media (max-width: 600px) {
  .filters {
    flex-direction: column;
    align-items: center;
  }
}

/* ─── HEADER (Sticky Navbar) ─── */
header {
  background: #d0ebe6;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1rem 2rem;
  position: sticky;
  top: 0;
  z-index: 1000;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  flex-wrap: wrap;
  width: 100%;
}

.logo {
  font-size: 1.5rem;
  font-weight: bold;
  color: #00695c;
}

nav {
  display: flex;
  flex-wrap: wrap;
}

nav a {
  margin: 0 1rem;
  color: #004d40;
  text-decoration: none;
  font-weight: 500;
  transition: color 0.3s;
}

nav a:hover {
  color: #009688;
}

/* ─── FOOTER (Sticky to Bottom) ─── */
footer {
  background-color: #00a88e;
  color: #fff;
  padding: 50px 20px;
  text-align: center;
  font-family: 'Poppins', sans-serif;
  width: 100%;
  
}

.footer-container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
}

.footer-logo img {
  max-width: 120px;
  margin-bottom: 20px;
}

.social-icons {
  margin: 25px 0;
  display: flex;
  justify-content: center;
  gap: 30px;
  flex-wrap: wrap;
}

.social-icon {
  font-size: 32px;
  color: #fff;
  text-decoration: none;
  transition: all 0.3s ease-in-out;
}

.social-icon:hover {
  transform: scale(1.3);
}

.social-icon.instagram:hover { color: #e4405f; }
.social-icon.mail:hover { color: #d44638; }
.social-icon.telephone:hover { color: #34b7f1; }
.social-icon.linkedin:hover { color: #0077b5; }
.social-icon.facebook:hover { color: #3b5998; }
.social-icon.whatsapp:hover { color: #25d366; }

.contact-info {
  margin-top: 20px;
  font-size: 16px;
  color: #ccc;
}

.contact-info a {
  color: #fff;
  text-decoration: none;
  transition: color 0.3s ease;
}

.contact-info a:hover {
  color: #f1c40f;
}
.results {
  display: flex;
  justify-content: center;
  align-items: flex-start;  /* Not full vertical center */
  flex-wrap: wrap;
  gap: 2rem;
  padding-top: 5vh;         /* Adds space from top */
  padding-bottom: 5vh;      /* Adds space from bottom */
  width: 100%;
  min-height: 60vh;         /* Ensures it's not too close to top */
}

main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 2rem;
}

  </style>

<style>

<script>
const guideBtn = document.getElementById('guideBtn');
const naviPanel = document.getElementById('naviPanel');
const closeBtn = document.getElementById('closeGuide');

guideBtn.addEventListener('click', () => {

  // Send message to iframe to trigger speech
  const iframe = naviPanel.querySelector('iframe');
  iframe.contentWindow.postMessage({ action: 'speak', text: "Hi, I am Navi, your Edu Navia guide. What would you like to do?" }, '*');
});

closeBtn.addEventListener('click', () => {

});
</script>

  <!-- Firebase + JS -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: import.meta.env.VITE_FIREBASE_API_KEY,
      authDomain: import.meta.env.VITE_FIREBASE_AUTH_DOMAIN,
      projectId: import.meta.env.VITE_FIREBASE_PROJECT_ID,
      storageBucket: import.meta.env.VITE_FIREBASE_STORAGE_BUCKET,
      messagingSenderId: import.meta.env.VITE_FIREBASE_MESSAGING_SENDER_ID,
      appId: import.meta.env.VITE_FIREBASE_APP_ID
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const locationFilter = document.getElementById("locationFilter");
    const tierFilter = document.getElementById("tierFilter");
    const results = document.getElementById("results");

    async function populateFilters() {
      const snapshot = await getDocs(collection(db, "colleges"));
      const locations = new Set();
      const tiers = new Set();
      snapshot.forEach(doc => {
        const data = doc.data();
        if (data.location) locations.add(data.location);
        if (data.type) tiers.add(data.type);
      });
      [...locations].sort().forEach(loc => {
        locationFilter.add(new Option(loc, loc));
      });
      [...tiers].sort().forEach(tier => {
        tierFilter.add(new Option(tier, tier));
      });
    }

    async function search() {
      const loc = locationFilter.value;
      const tier = tierFilter.value;
      let q = collection(db, "colleges");
      if (loc && tier) q = query(q, where("location", "==", loc), where("type", "==", tier));
      else if (loc) q = query(q, where("location", "==", loc));
      else if (tier) q = query(q, where("type", "==", tier));

      const snap = await getDocs(q);
      results.innerHTML = "";
      if (snap.empty) {
        document.getElementById("noResultsModal").style.display = "flex";
        return;
      }
      snap.forEach(doc => {
        const data = doc.data();
        const card = document.createElement("div");
        card.className = "card reveal";
        card.style.cssText = `
          background: #fff;
          border: 1px solid #e2e8f0;
          box-shadow: 0 4px 15px rgba(0,0,0,0.05);
          text-align: left;
          padding: 24px;
          display: flex;
          flex-direction: column;
          gap: 12px;
          min-height: 200px;
        `;
        card.innerHTML = `
          <div style="font-size: 0.75rem; font-weight: 700; color: #0d9488; text-transform: uppercase; letter-spacing: 0.5px;">${data.type || 'Institution'}</div>
          <h3 style="margin: 0; color: #0f172a; font-size: 1.25rem;">${data.name}</h3>
          <div style="color: #64748b; font-size: 0.9rem; display: flex; align-items: center; gap: 6px;">
            <i class="fa-solid fa-location-dot"></i> ${data.location || 'N/A'}
          </div>
          <div style="margin-top: auto; border-top: 1px solid #f1f5f9; padding-top: 15px; display: flex; justify-content: space-between; align-items: center;">
            <a href="${data.website || '#'}" target="_blank" style="color: #0d9488; text-decoration: none; font-weight: 600; font-size: 0.85rem;">Visit Site <i class="fa-solid fa-arrow-up-right-from-square" style="font-size: 0.7rem;"></i></a>
            <span style="font-size: 0.75rem; color: #94a3b8;">#${data.id || '---'}</span>
          </div>
        `;
        results.appendChild(card);
      });
    }

    document.getElementById("searchBtn").addEventListener("click", search);
    window.closeModal = () => document.getElementById("noResultsModal").style.display = "none";
    populateFilters();
    search();
  </script>
  <script src="./global-features.js" defer></script>
