  /* Base Layout Setup for Sticky Footer */
html, body {

/* Modal for No Results */
.modal {

  width: 100%; height: 100%;
  background-color: rgba(0,0,0,0.6);
  align-items: center;
  justify-content: center;
  z-index: 1000;
}

.modal-content {
  background: white;
  padding: 2rem;
  border-radius: 16px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  max-width: 400px;
  animation: fadeIn 0.3s ease-in-out;
}

.modal-content h2 {
  color: #ef4444;
}

.modal-content button {
  margin-top: 1rem;
  background: #0d9488;
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 8px;
  cursor: pointer;
}

@keyframes fadeIn {
  from { transform: scale(0.95); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

/* Responsive */
@media (max-width: 600px) {
  .filters {
    flex-direction: column;
    align-items: center;
  }
}

  --border-dark: rgba(255,255,255,0.08);

<script>
  const iconToggle = document.getElementById("themeToggle");

  if (localStorage.getItem("theme") === "dark") {
    document.body.classList.add("dark");
    iconToggle.textContent = "☀️";
  }

  iconToggle.addEventListener("click", () => {
    document.body.classList.toggle("dark");
    const isDark = document.body.classList.contains("dark");

    iconToggle.textContent = isDark ? "☀️" : "🌙";
    localStorage.setItem("theme", isDark ? "dark" : "light");
  });
</script>

<script>
  const toggle = document.createElement("div");
  toggle.className = "theme-toggle";
  toggle.innerHTML = `<i class="fa-solid fa-moon"></i>`;
  document.body.appendChild(toggle);

  const icon = toggle.querySelector("i");

  // Load saved theme
  if (localStorage.getItem("theme") === "dark") {
    document.body.classList.add("dark");
    icon.classList.replace("fa-moon", "fa-sun");
  }

  toggle.addEventListener("click", () => {
    document.body.classList.toggle("dark");
    const isDark = document.body.classList.contains("dark");

    icon.classList.toggle("fa-sun", isDark);
    icon.classList.toggle("fa-moon", !isDark);
    localStorage.setItem("theme", isDark ? "dark" : "light");
  });
</script>

  <!-- Firebase + JS -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: import.meta.env.VITE_FIREBASE_API_KEY,
      authDomain: import.meta.env.VITE_FIREBASE_AUTH_DOMAIN,
      projectId: import.meta.env.VITE_FIREBASE_PROJECT_ID,
      storageBucket: import.meta.env.VITE_FIREBASE_STORAGE_BUCKET,
      messagingSenderId: import.meta.env.VITE_FIREBASE_MESSAGING_SENDER_ID,
      appId: import.meta.env.VITE_FIREBASE_APP_ID
    };

    if (!firebaseConfig.apiKey) {
      console.error("Firebase API Key is missing! Check your .env file.");
    }

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const locationFilter = document.getElementById("locationFilter");
    const tierFilter = document.getElementById("tierFilter");
    const results = document.getElementById("results");

    async function populateFilters() {
      const snapshot = await getDocs(collection(db, "colleges"));
      const locations = new Set();
      const tiers = new Set();

      snapshot.forEach(doc => {
        const data = doc.data();
        if (data.location) locations.add(data.location);
        if (data.type) tiers.add(data.type);
      });

      locations.forEach(loc => {
        const option = document.createElement("option");
        option.value = option.textContent = loc;
        locationFilter.appendChild(option);
      });

      tiers.forEach(tier => {
        const option = document.createElement("option");
        option.value = option.textContent = tier;
        tierFilter.appendChild(option);
      });
    }

    async function searchUniversities() {
      const loc = locationFilter.value;
      const tier = tierFilter.value;

      let q = collection(db, "colleges");

      if (loc && tier) {
        q = query(q, where("location", "==", loc), where("type", "==", tier));
      } else if (loc) {
        q = query(q, where("location", "==", loc));
      } else if (tier) {
        q = query(q, where("type", "==", tier));
      }

      const snap = await getDocs(q);
      results.innerHTML = "";

      if (snap.empty) {
        document.getElementById("noResultsModal").style.display = "flex";
        return;
      }

      snap.forEach(doc => {
        const data = doc.data();
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <h3>${data.name || "Unnamed University"}</h3>
          <p><strong>Location:</strong> ${data.location || "N/A"}</p>
          <p><strong>Tier:</strong> ${data.type || "N/A"}</p>
        `;
        results.appendChild(card);
      });
    }

    document.getElementById("searchBtn").addEventListener("click", searchUniversities);

    window.closeModal = () => {
      document.getElementById("noResultsModal").style.display = "none";
    };

    populateFilters();
    function applyFilters() {
  const tier = document.getElementById('tierFilter').value;
  const location = document.getElementById('locationFilter').value;

  const filtered = universities.filter(uni => {
    const matchesTier = (tier === 'all' || uni.tier === tier);
    const matchesLocation = (location === 'all' || uni.location === location);
    return matchesTier && matchesLocation;
  });

  displayResults(filtered);
}

  </script>
